<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KeepStacking</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3"  y="17" width="18" height="4" rx="2" fill="#f59e0b"/>
          <rect x="5"  y="11" width="14" height="4" rx="2" fill="#fbbf24"/>
          <rect x="7"  y="5"  width="10" height="4" rx="2" fill="#fde68a"/>
        </svg>
        <span class="title">KeepStacking</span>
      </div>
    </div>

    <!-- Wrong tab: Prop Dashboards + totals + breakdown -->
    <div id="wrong-tab" class="section hidden">
      <div id="prop-dashboards-section" class="breakdown">
        <div class="breakdown-header">
          <div class="breakdown-header-left">
            <span class="breakdown-title">Prop Dashboards</span>
          </div>
          <button id="toggle-prop-dashboards" class="toggle-btn" type="button">Hide</button>
        </div>
        <div id="dashboard-links" class="dashboard-links"></div>
      </div>
      <div id="wrong-tab-totals-wrap" class="wrong-tab-totals-wrap hidden">
        <div class="view-mode-toggle wrong-tab-pnl-toggle" role="group" aria-label="PNL range">
          <button type="button" class="view-mode-btn pnl-range-btn active" data-range="all">All data</button>
          <button type="button" class="view-mode-btn pnl-range-btn" data-range="thisYear">This year</button>
        </div>
        <div id="wrong-tab-totals" class="wrong-tab-totals"></div>
      </div>
      <div id="by-prop-section" class="breakdown hidden">
        <div class="breakdown-header">
          <div class="breakdown-header-left">
            <div class="view-mode-toggle" role="group" aria-label="Breakdown view">
              <button type="button" class="view-mode-btn active" data-mode="byProp">By prop</button>
              <button type="button" class="view-mode-btn" data-mode="byMonth">By month</button>
              <button type="button" class="view-mode-btn" data-mode="byYear">By year</button>
            </div>
            <button id="toggle-by-prop" class="toggle-btn">Show</button>
          </div>
        </div>
        <div class="breakdown-col-header">
          <span></span>
          <span>Spent</span>
          <span>Received</span>
          <span>Net</span>
        </div>
        <div id="by-prop-list" class="breakdown-list hidden"></div>
      </div>
    </div>

    <!-- Main content -->
    <div id="main-content" class="section hidden">

      <!-- Spent / Received side by side -->
      <div class="metrics-row">
        <div class="metric-card">
          <div class="metric-label">Spent</div>
          <div id="spent-display" class="metric-amount spent">—</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Received</div>
          <div id="received-display" class="metric-amount received">—</div>
        </div>
      </div>

      <!-- Net profit -->
      <div class="net-card">
        <div class="net-label">Net Profit</div>
        <div id="net-display" class="net-amount">—</div>
        <div id="last-calculated" class="last-calculated"></div>
        <div class="pnl-range-toggle-wrap">
          <div class="view-mode-toggle" role="group" aria-label="PNL range">
            <button type="button" class="view-mode-btn pnl-range-btn active" data-range="all">All data</button>
            <button type="button" class="view-mode-btn pnl-range-btn" data-range="thisYear">This year</button>
          </div>
        </div>
      </div>

      <!-- Status / progress -->
      <div id="status-row" class="status-row hidden">
        <div class="spinner"></div>
        <span id="status-text">Calculating...</span>
      </div>

      <!-- Action button -->
      <button id="calc-btn" class="btn btn-primary">Calculate</button>

      <!-- Combined monthly breakdown -->
      <div id="breakdown-section" class="breakdown hidden">
        <div class="breakdown-header">
          <div class="breakdown-header-left">
            <div class="view-mode-toggle" role="group" aria-label="Breakdown view">
              <button type="button" class="view-mode-btn breakdown-view-btn active" data-view="byMonth">By Month</button>
              <button type="button" class="view-mode-btn breakdown-view-btn" data-view="byYear">By Year</button>
            </div>
            <button id="toggle-breakdown" class="toggle-btn">Show</button>
          </div>
        </div>
        <div class="breakdown-col-header">
          <span></span>
          <span>Spent</span>
          <span>Received</span>
          <span>Net</span>
        </div>
        <div id="breakdown-list" class="breakdown-list hidden"></div>
      </div>

    </div>

    <!-- Footer: debug (left) + context action (right) -->
    <div class="popup-footer">
      <button id="debug-btn" class="btn btn-ghost debug-btn" title="Toggle debug info">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="m8 2 1.88 1.88"/>
          <path d="M14.12 3.88 16 2"/>
          <path d="M9 7.13v-1a3.003 3.003 0 0 1 6 0v1"/>
          <path d="M12 8c-3.866 0-7 2.239-7 5v4h14v-4c0-2.761-3.134-5-7-5z"/>
          <path d="M5 17v2"/>
          <path d="M19 17v2"/>
          <path d="M12 17v4"/>
          <path d="M3 13h4"/>
          <path d="M17 13h4"/>
        </svg>
      </button>
      <button id="clear-all-cache-btn" class="btn btn-ghost footer-context-btn hidden" title="Clear all cached data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
      <button id="reset-btn" class="btn btn-ghost footer-context-btn hidden" title="Clear cached data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </button>
    </div>

    <div id="debug-panel" class="debug-panel hidden"></div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
